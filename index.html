<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comment Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #f5c842;
  --silver: #c0c8d8;
  --bronze: #cd7f4e;
  --bg: #0d0f1a;
  --surface: #141726;
  --surface2: #1c2035;
  --accent: #5b6af0;
  --accent2: #e05aff;
  --text: #eef0ff;
  --muted: #7a80a0;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Tajawal', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(91,106,240,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 60% 40% at 100% 100%, rgba(224,90,255,0.10) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

.page {
  position: relative;
  z-index: 1;
  max-width: 820px;
  margin: 0 auto;
  padding: 48px 20px 80px;
}

.header { text-align: center; margin-bottom: 52px; }
.header-eyebrow { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--accent); margin-bottom: 14px; opacity: 0; animation: fadeUp 0.6s 0.1s forwards; }
.header h1 { font-family: 'Playfair Display', serif; font-size: clamp(32px, 6vw, 56px); line-height: 1.1; background: linear-gradient(135deg, #fff 30%, var(--accent2) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; opacity: 0; animation: fadeUp 0.6s 0.2s forwards; }
.header-sub { margin-top: 16px; font-size: 15px; color: var(--muted); opacity: 0; animation: fadeUp 0.6s 0.3s forwards; }
.stats-bar { display: flex; justify-content: center; gap: 40px; margin-top: 32px; opacity: 0; animation: fadeUp 0.6s 0.4s forwards; }
.stat { text-align: center; }
.stat-value { font-size: 28px; font-weight: 900; color: var(--gold); line-height: 1; }
.stat-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-top: 4px; }
.divider { width: 1px; background: var(--surface2); }

.podium { display: flex; align-items: flex-end; justify-content: center; gap: 12px; margin-bottom: 48px; opacity: 0; animation: fadeUp 0.7s 0.5s forwards; }
.podium-item { flex: 1; max-width: 220px; text-align: center; }
.podium-item:nth-child(1) { order: 2; }
.podium-item:nth-child(2) { order: 1; }
.podium-item:nth-child(3) { order: 3; }
.podium-card { border-radius: 16px 16px 0 0; padding: 20px 12px; position: relative; overflow: hidden; }

.podium-item:nth-child(1) .podium-card { background: linear-gradient(160deg, #2a2000 0%, #1a1500 100%); border: 1.5px solid rgba(245,200,66,0.35); padding-top: 32px; }
.podium-item:nth-child(2) .podium-card { background: linear-gradient(160deg, #1e2030 0%, #14162a 100%); border: 1.5px solid rgba(192,200,216,0.25); }
.podium-item:nth-child(3) .podium-card { background: linear-gradient(160deg, #201510 0%, #150f0a 100%); border: 1.5px solid rgba(205,127,78,0.25); }

.podium-medal { font-size: 32px; margin-bottom: 10px; display: block; }
.podium-name { font-size: 14px; font-weight: 700; margin-bottom: 8px; word-break: break-word; }
.podium-item:nth-child(1) .podium-name { color: var(--gold); }
.podium-item:nth-child(2) .podium-name { color: var(--silver); }
.podium-item:nth-child(3) .podium-name { color: var(--bronze); }
.podium-count { font-size: 26px; font-weight: 900; }
.podium-item:nth-child(1) .podium-count { color: var(--gold); }
.podium-item:nth-child(2) .podium-count { color: var(--silver); }
.podium-item:nth-child(3) .podium-count { color: var(--bronze); }
.podium-count-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
.podium-base { height: 8px; }
.podium-item:nth-child(1) .podium-base { background: rgba(245,200,66,0.5); }
.podium-item:nth-child(2) .podium-base { background: rgba(192,200,216,0.3); }
.podium-item:nth-child(3) .podium-base { background: rgba(205,127,78,0.3); }

.section-title { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
.list { display: flex; flex-direction: column; gap: 6px; }
.row { display: grid; grid-template-columns: 40px 1fr auto; align-items: center; gap: 14px; background: var(--surface); border: 1px solid transparent; border-radius: 10px; padding: 12px 16px; opacity: 0; animation: fadeIn 0.4s forwards; position: relative; overflow: hidden; }
.row:hover { border-color: rgba(91,106,240,0.3); background: var(--surface2); }
.row-rank { font-size: 13px; font-weight: 700; color: var(--muted); text-align: center; }
.row-name { font-size: 15px; font-weight: 500; }
.row-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; min-width: 80px; }
.row-count { font-size: 16px; font-weight: 900; color: var(--accent); }
.row-bar-wrap { width: 80px; height: 3px; background: var(--surface2); border-radius: 2px; }
.row-bar { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.8s; }

.search-wrap { margin-bottom: 20px; position: relative; }
.search-wrap input { width: 100%; background: var(--surface); border: 1px solid var(--surface2); border-radius: 10px; padding: 12px 16px 12px 44px; color: var(--text); font-family: 'Tajawal', sans-serif; outline: none; direction: rtl; }
.search-wrap input:focus { border-color: var(--accent); }
.search-icon { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); }

@keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; transform: translateX(-6px); } to { opacity: 1; transform: translateX(0); } }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="header-eyebrow">Facebook Post · Comment Rankings</div>
    <h1>Leaderboard</h1>
    <p class="header-sub">Ranked by number of comments left on the post</p>
    <div class="stats-bar">
      <div class="stat"><div class="stat-value">3,499</div><div class="stat-label">Total Comments</div></div>
      <div class="divider"></div>
      <div class="stat"><div class="stat-value">133</div><div class="stat-label">Unique Commenters</div></div>
      <div class="divider"></div>
      <div class="stat"><div class="stat-value">567</div><div class="stat-label">Top Score</div></div>
    </div>
  </div>
  <div class="podium" id="podium"></div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search" placeholder="Search by name..." oninput="filterList()">
  </div>
  <div class="section-title">All Commenters</div>
  <div id="list" class="list"></div>
  <div id="no-results" style="display:none; text-align:center; padding:40px; color:var(--muted)">No results found</div>

</div>

<script>
const data = [{"rank":1,"name":"جنات محمد","count":567},{"rank":2,"name":"ام محمود ام محمود","count":287},{"rank":3,"name":"Na Da","count":276},{"rank":4,"name":"Zë Zë","count":188},{"rank":5,"name":"Hager Youssef","count":134},{"rank":6,"name":"منصور الناظر","count":132},{"rank":7,"name":"Sa Sso","count":112},{"rank":8,"name":"حسانى فتحى منصور ابوماضى","count":109},{"rank":9,"name":"خشوع لله","count":106},{"rank":10,"name":"المتوكله علي الله","count":100},{"rank":11,"name":"Om MOhamed","count":100},{"rank":12,"name":"ابو محمد الديب","count":71},{"rank":13,"name":"مريم مريم","count":68},{"rank":14,"name":"آنہآ مــآمت عـــبودي وجـــودي","count":66},{"rank":15,"name":"Fahd Farg","count":65},{"rank":16,"name":"رغد مصطفي","count":58},{"rank":17,"name":"Sokara Saad","count":58},{"rank":18,"name":"زاد المتقين","count":54},{"rank":19,"name":"Akarm Elzen","count":53},{"rank":20,"name":"Om Ahmed","count":51},{"rank":21,"name":"ام طه","count":43},{"rank":22,"name":"رضاك يارب غايتي ومراضي","count":38},{"rank":23,"name":"وبشر الصابرين","count":35},{"rank":24,"name":"ام عبدالله","count":34},{"rank":25,"name":"Mohamed Hashem","count":34},{"rank":26,"name":"محمودعلي الحدربي","count":33},{"rank":27,"name":"ام عبدالله احمد خير","count":32},{"rank":28,"name":"نجمه فى السماء","count":30},{"rank":29,"name":"امنيتى جنه الرحمن","count":28},{"rank":30,"name":"Mona Ahmed Mahmed","count":28},{"rank":31,"name":"ام احمد عمر فتحي","count":28},{"rank":32,"name":"اسماء البنا","count":27},{"rank":33,"name":"Manal Twab","count":26},{"rank":34,"name":"سعودى ابو احمد وسجى","count":24},{"rank":35,"name":"انس وحمزه","count":24},{"rank":36,"name":"حبيبة الرحمن","count":22},{"rank":37,"name":"Ahmed Azab","count":20},{"rank":38,"name":"Heaam A Shelf","count":17},{"rank":39,"name":"Omar Sayed","count":15},{"rank":40,"name":"محمد المدنى","count":14},{"rank":41,"name":"Om Mohamed","count":14},{"rank":42,"name":"Moshera Othman","count":13},{"rank":43,"name":"ام احمد ويوسف","count":12},{"rank":44,"name":"غصن.الزيتون","count":12},{"rank":45,"name":"Ahmed'd Alzain","count":10},{"rank":46,"name":"موسى سعدى","count":10},{"rank":47,"name":"زهرة الحياة","count":10},{"rank":48,"name":"خلود خالد","count":10},{"rank":49,"name":"أم إياد","count":10},{"rank":50,"name":"Marwa Abdelsamea","count":9},{"rank":51,"name":"ام حسين","count":7},{"rank":52,"name":"مطبخ ميسو","count":7},{"rank":53,"name":"Mona Ahmed","count":7},{"rank":54,"name":"Nahed Mahmoud","count":7},{"rank":55,"name":"هدى للمتقين","count":6},{"rank":56,"name":"Ashraf Abd Rabo","count":6},{"rank":57,"name":"ام محمد","count":6},{"rank":58,"name":"ثقتى بالله تكفيني","count":6},{"rank":59,"name":"ام محمد حمام","count":6},{"rank":60,"name":"فاطمه عبد النبى","count":6},{"rank":61,"name":"Esraa Elkady","count":5},{"rank":62,"name":"ام ملك ومالك","count":5},{"rank":63,"name":"رحمه وليد","count":5},{"rank":64,"name":"امومة سر الحنان","count":4},{"rank":65,"name":"شاهر باهر","count":4},{"rank":66,"name":"ام محمد على","count":4},{"rank":67,"name":"وعد الوعد","count":4},{"rank":68,"name":"شمس الشموسه","count":4},{"rank":69,"name":"Sad Bird","count":3},{"rank":70,"name":"اللهم ارزقنا حسن الخاتمه","count":3},{"rank":71,"name":"Mamet Zain","count":3},{"rank":72,"name":"ام جاسر المناعى","count":3},{"rank":73,"name":"جنة الرحمن غايتي","count":2},{"rank":74,"name":"OM Kareem","count":2},{"rank":75,"name":"طاعة الله","count":2},{"rank":76,"name":"Om Hussien","count":2},{"rank":77,"name":"Sabreen Kamal","count":2},{"rank":78,"name":"ابو عبده للرخام","count":2},{"rank":79,"name":"أم معتز","count":2},{"rank":80,"name":"أم عمر مختار","count":2},{"rank":81,"name":"محمد خلف","count":2},{"rank":82,"name":"عبد الله الزين","count":2},{"rank":83,"name":"اولادى سر حياتى","count":1}];

const maxCount = data[0].count;
const medals = ['🥇','🥈','🥉'];
const podiumEl = document.getElementById('podium');
const listEl = document.getElementById('list');

// Build podium
[0, 1, 2].forEach(i => {
  const d = data[i];
  const el = document.createElement('div');
  el.className = 'podium-item';
  el.innerHTML = `<div class="podium-card"><span class="podium-medal">${medals[i]}</span><div class="podium-name">${d.name}</div><div class="podium-count">${d.count}</div><div class="podium-count-label">comments</div></div><div class="podium-base"></div>`;
  podiumEl.appendChild(el);
});

function buildRows(filtered) {
  listEl.innerHTML = '';
  filtered.forEach((d, i) => {
    const pct = (d.count / maxCount * 100).toFixed(1);
    const row = document.createElement('div');
    row.className = 'row';
    row.style.animationDelay = `${Math.min(i * 18, 400)}ms`;
    row.innerHTML = `<div class="row-rank">${d.rank}</div><div class="row-name">${d.name}</div><div class="row-right"><div class="row-count">${d.count}</div><div class="row-bar-wrap"><div class="row-bar" style="width:${pct}%"></div></div></div>`;
    listEl.appendChild(row);
  });
}

buildRows(data);

function filterList() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const filtered = q ? data.filter(d => d.name.toLowerCase().includes(q)) : data;
  buildRows(filtered);
}
</script>
</body>
</html>
