// Build full list (all 133)
function buildRows(filtered) {
  listEl.innerHTML = '';
  const noRes = document.getElementById('no-results');
  if (filtered.length === 0) {
    noRes.style.display = 'block';
    return;
  }
  noRes.style.display = 'none';

  filtered.forEach((d, i) => {
    const pct = (d.count / maxCount * 100).toFixed(1);
    const row = document.createElement('div');
    row.className = 'row';
    row.style.animationDelay = ${Math.min(i * 18, 400)}ms;

    // rank color
    let rankColor = 'var(--muted)';
    if (d.rank === 1) rankColor = 'var(--gold)';
    else if (d.rank === 2) rankColor = 'var(--silver)';
    else if (d.rank === 3) rankColor = 'var(--bronze)';

    row.innerHTML = `
      <div class="row-rank" style="color:${rankColor}">${d.rank}</div>
      <div class="row-name">${d.name}</div>
      <div class="row-right">
        <div class="row-count">${d.count.toLocaleString()}</div>
        <div class="row-bar-wrap">
          <div class="row-bar" style="width:0%" data-pct="${pct}"></div>
        </div>
      </div>
    `;
    listEl.appendChild(row);
  });

  // animate bars after paint
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      document.querySelectorAll('.row-bar').forEach(b => {
        b.style.width = b.dataset.pct + '%';
      });
    });
  });
}

buildRows(data);

function filterList() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const filtered = q ? data.filter(d => d.name.toLowerCase().includes(q)) : data;
  buildRows(filtered);
}
